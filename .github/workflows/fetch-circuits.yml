# Cron désactivé le 2026-07-07 : SWS bloque le scraping par reCAPTCHA (voir PIPELINE.md).
name: Fetch SWS Circuits

on:
  workflow_dispatch: # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch circuits from SWS
        run: npx tsx scripts/fetch-circuits.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/circuits.json
          if ! git diff --staged --quiet; then
            git commit -m "data: update circuits.json"
            git push
          fi
